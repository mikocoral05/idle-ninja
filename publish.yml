# This workflow will run tests, build the code, and publish a package to npm when a new version tag is pushed.
name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*" # Trigger on version tags like v1.0.0, v1.2.3, etc.

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org/" # Configure npm to publish to the public registry

      - name: Install dependencies
        run: npm ci # Use 'ci' for clean, reproducible installs in CI

      - name: Run tests
        run: npm run test

      - name: Build project
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
